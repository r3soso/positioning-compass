# Cloudflare Pages 配置
name = "positioning-compass"
compatibility_date = "2025-06-01"
pages_build_output_dir = "public"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "positioning-compass-db"
database_id = "505ef12f-e214-4d3f-a549-b2302c2ec4d3"

# Cloudflare Workers AI 绑定（用于语音转写 Whisper）
[ai]
binding = "AI"

# Cloudflare Cron 触发器 — 准时触发早报（北京时间 08:05）
[triggers]
crons = ["5 0 * * *"]

# 环境变量
[vars]
ADMIN_PASSWORD = "541122"
DEEPSEEK_API_KEY = "sk-a21dbc7701be4359924062db322787e7"
# GH_PAT 需要在 Cloudflare Dashboard 中手动添加（防止密钥泄露）
