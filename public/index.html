<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="定位罗盘">
<meta name="theme-color" content="#f5f3f0">
<meta name="description" content="基于特劳特定位理论，AI深度追问，提炼品牌定位与卖点">
<title>定位罗盘 — 特劳特定位理论AI问答</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/report.css">
<link rel="stylesheet" href="css/voice.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🎯 定位<span>罗盘</span></h1>
    <p>基于特劳特定位理论 · AI深度追问 · 提炼你的品牌定位与卖点</p>
    <div class="badge-row">
      <span class="badge">🧠 心智阶梯</span><span class="badge">⚔️ 差异化</span>
      <span class="badge">🔍 聚焦法则</span><span class="badge">📣 语言钉</span>
    </div>
    <div id="offlineIndicator" style="display:none;margin-top:8px;">
      <span class="offline-badge"><span class="offline-dot"></span>AI服务未连接（离线模式）</span>
    </div>
  </div>

  <!-- Resume Banner -->
  <div class="resume-banner" id="resumeBanner" style="display:none;">
    <p>📝 检测到未完成的问答进度，是否继续上次？</p>
    <div class="btn-row">
      <button class="btn btn-primary" id="resumeBtn">继续上次</button>
      <button class="btn btn-ghost" id="newSessionBtn">重新开始</button>
    </div>
  </div>

  <!-- Role Selection -->
  <div class="role-section" id="roleSection">
    <h2>👤 请选择你的角色</h2>
    <div class="role-grid" id="roleGrid"></div>
  </div>

  <!-- Q&A Area -->
  <div id="qaArea" style="display:none;">
    <div class="progress-bar" id="progressBar"></div>
    <div id="qaCards"></div>
    <div class="btn-row" id="qaButtons"></div>
  </div>

  <!-- Final Report -->
  <div class="report" id="reportSection"></div>

</div>

<!-- JS Modules (order matters) -->
<script src="js/utils/dom.js"></script>
<script src="js/utils/format.js"></script>
<script src="js/utils/filter-speech.js"></script>
<script src="js/utils/wav-encoder.js"></script>
<script src="js/config.js"></script>
<script src="js/modules/roles.js"></script>
<script src="js/state.js"></script>
<script src="js/modules/question-engine.js"></script>
<script src="js/modules/voice-input.js"></script>
<script src="js/modules/analysis.js"></script>
<script src="js/modules/report-builder.js"></script>
<script src="js/modules/report-export.js"></script>
<script src="js/modules/history.js"></script>
<script src="js/app.js"></script>
</body>
</html>
